name: tests
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.ipynb'
      - '**.bib'
      - 'ms/*'
  pull_request:
    types: [opened, reopened, edited, synchronize]
    paths-ignore:
      - '**.md'
      - '**.ipynb'
      - '**.bib'
      - 'ms/*'

jobs:

  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Pynteny is a pure-pip package (no conda / external binaries required).
      - name: Install Pynteny
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install coverage

      - name: Run tests and collect coverage
        run: |
          pynteny --help
          coverage run --omit pynteny/wrappers.py,pynteny/cli.py,pynteny/subcommands.py,pynteny/utils.py -m unittest discover tests
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          version: "v0.1.15"
